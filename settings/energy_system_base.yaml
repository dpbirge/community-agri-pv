# Shared Energy System Configuration
# Defines the energy system shared throughout the community
# Defines ALL wind systems as they do not interact with farming operations
# Defined any non-agri-pv based solar panels, as all agri-pv systems are defined
# at the farm level. Panel location is not specified intentionally.
#
# Data files: see energy_supply section in settings/data_registry.yaml

config_name: baseline_energy_system

# --- Solar System ---
community_solar:
  low_density:
    area_ha: 0.04
  medium_density:
    area_ha: 0.0
  high_density:
    area_ha: 0.0
 
# --- Wind System ---
wind_turbines:
  small_turbine:
    number: 4
  medium_turbine:
    number: 0
  large_turbine:
    number: 0

# --- Generator System ---
generator:
  has_generator: true
  type: diesel_100kw          # row key in generators-toy.csv (100 kW engine)
  rated_capacity_kw: 50       # operational limit (derated); Willans idle losses use engine size from CSV
  reference_hours: 24         # hours over which to spread deficit for power sizing

# --- Battery System ---
battery:
  has_battery: true
  type: lithium_iron_phosphate_community   # row key in batteries-toy.csv (1000 kWh LFP)
  capacity_kwh: 1000

# --- Grid Connection ---
grid_connection: full_grid