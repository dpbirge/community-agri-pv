# Energy System — OVERSUPPLY regime
# Large solar + wind + battery

config_name: stress_energy_oversupply

community_solar:
  low_density:
    area_ha: 2.0
  medium_density:
    area_ha: 2.0
  high_density:
    area_ha: 2.0

wind_turbines:
  small_turbine:
    number: 20
  medium_turbine:
    number: 10
  large_turbine:
    number: 6

generator:
  has_generator: true
  type: diesel_100kw
  rated_capacity_kw: 100

battery:
  has_battery: true
  type: lithium_iron_phosphate_medium
  capacity_kwh: 500

grid_connection: full_grid
