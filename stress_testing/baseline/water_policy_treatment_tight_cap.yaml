# Water Policy — minimize_treatment with tight municipal cap
# Same tight municipal cap (150 m3/month) as the minimize_draw variant.
# minimize_treatment prefers untreated groundwater first, then municipal,
# then treated groundwater — so municipal usage pattern will differ.

water_policy_name: treatment_tight_cap

irrigation:
  mode: static
  static_policy: full_eto

groundwater:
  monthly_cap_m3: null

municipal:
  monthly_cap_m3: 150

cap_enforcement:
  look_ahead: true

strategy: minimize_treatment

prefill:
  enabled: true
  look_ahead_days: 3

treatment_smoothing:
  source_priority: minimize_cost
  fallow_treatment: true
  fallow_horizon_days: 14
  tank_feedback:
    high_mark: 0.90
    low_mark: 0.15
