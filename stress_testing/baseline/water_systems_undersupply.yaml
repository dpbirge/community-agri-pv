# Water Systems — UNDERSUPPLY regime
# Low throughput, tight municipal cap, minimal storage

config_name: stress_water_undersupply

systems:
  - name: main_irrigation

    wells:
      - name: well_1
        depth_m: 20
        tds_ppm: 1400
        pump_type: medium_submersible

    treatment:
      type: bwro
      throughput_m3_hr: 10
      goal_output_tds_ppm: 400

    municipal_source:
      tds_ppm: 200
      cost_per_m3: 0.50
      throughput_m3_hr: 50

    storage:
      type: underground_tank
      capacity_m3: 50
      initial_level_m3: 25
      max_output_m3_hr: 20
      initial_tds_ppm: 500
